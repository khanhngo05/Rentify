name: rentify
description: "Rentify - Ứng dụng cho thuê trang phục trực tuyến đa chi nhánh"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

  # Supabase
  supabase_flutter: ^2.9.0

  # GPS & Maps
  geolocator: ^13.0.4
  geoflutterfire_plus: ^0.0.31

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI Utilities
  shimmer: ^3.0.0
  intl: ^0.20.2
  go_router: ^14.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

