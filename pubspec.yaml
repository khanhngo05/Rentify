name: rentify
description: "Rentify - Ứng dụng cho thuê trang phục trực tuyến đa chi nhánh"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.1.6
  google_sign_in: ^6.2.2

  # Supabase
  supabase_flutter: ^2.9.0

  # GPS & Maps
  geolocator: ^13.0.4
  geoflutterfire_plus: ^0.0.31

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI Utilities
  shimmer: ^3.0.0
  intl: ^0.20.2
  go_router: ^14.8.1
  url_launcher: ^6.3.1
  provider: ^6.1.5+1
  local_auth: ^2.3.0
  shared_preferences: ^2.3.2

  # AI Chatbot
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  
  # Testing
  mockito: ^5.4.4
  build_runner: ^2.4.13
  faker: ^2.2.0
  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/app_icon_foreground.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

